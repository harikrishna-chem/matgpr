name: Bug report
description: Report a reproducible matgpr problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include a minimal code example or notebook cell when possible.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, operating system, install method, and relevant dependencies.
      value: |
        - Python:
        - OS:
        - matgpr version/commit:
        - Install method:
    validations:
      required: true
  - type: textarea
    id: traceback
    attributes:
      label: Traceback or logs
      render: text
