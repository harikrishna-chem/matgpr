[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "matgpr"
version = "0.1.0"
description = "Gaussian Process Regression toolkit for materials informatics, including physics-informed mean functions."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "gpytorch",
    "joblib",
    "matplotlib",
    "matminer",
    "mendeleev",
    "numpy",
    "pandas",
    "pymatgen",
    "rdkit",
    "scikit-learn",
    "scipy",
    "torch",
]

[project.optional-dependencies]
dev = [
    "build",
    "ipykernel",
    "nbconvert",
    "nbformat",
    "pytest",
    "pytest-cov",
    "ruff",
    "twine",
]
examples = [
    "shap",
]
structures = [
    "ase",
    "dscribe",
]
molecular-extra = [
    "mordredcommunity",
]
jarvis = [
    "jarvis-tools",
]
deep = [
    "deepchem",
]
all-fingerprints = [
    "ase",
    "deepchem",
    "dscribe",
    "jarvis-tools",
    "mordredcommunity",
]

[tool.setuptools.packages.find]
include = ["matgpr*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = [
    "--strict-markers",
    "--strict-config",
]

[tool.ruff]
line-length = 100
target-version = "py39"
extend-exclude = [
    "examples",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
]
ignore = [
    "E402",
    "E501",
]
