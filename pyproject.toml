[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "matgpr"
version = "0.1.0"
description = "Gaussian Process Regression toolkit for materials informatics, including physics-informed mean functions."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "gpytorch",
    "joblib",
    "matplotlib",
    "numpy",
    "pandas",
    "scikit-learn",
    "scipy",
    "torch",
]

[tool.setuptools.packages.find]
include = ["matgpr*"]
