[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "matgpr"
version = "0.1.0"
description = "Materials informatics utilities for Gaussian Process Regression and physics-informed GPR."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "gpytorch",
    "joblib",
    "matplotlib",
    "numpy",
    "pandas",
    "scikit-learn",
    "scipy",
    "torch",
]

[tool.setuptools.packages.find]
include = ["genmatics_gpr*"]
